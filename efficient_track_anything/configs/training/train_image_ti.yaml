# Stage 1 (image pretraining) — efficienttam_ti.
model:
  config_file: configs/efficienttam/efficienttam_ti.yaml
  overrides:
    - "++model.sam_mask_decoder_extra_args=null"

train:
  epochs: 90
  batch_size: 16              # smaller backbone fits more samples
  num_workers: 4
  backbone_lr: 6.0e-5
  head_lr: 3.0e-4
  layerwise_decay: 0.8
  weight_decay: 0.1
  warmup_pct: 0.05
  grad_clip: 0.1

  focal_w: 20.0
  dice_w: 1.0
  iou_w: 1.0
  obj_w: 1.0

  image_size: 1024
  prompt_mode: mixed
  max_neg_points: 0
  box_jitter_pct: 0.05
  scale_range: [0.5, 1.0]
  hflip_prob: 0.5
  brightness: 0.1
  contrast: 0.03
  saturation: 0.03
  grayscale_prob: 0.05
  affine_degree: 25.0
  affine_shear: 20.0

  objects_per_image: 8

  log_every: 20
  seed: 0
