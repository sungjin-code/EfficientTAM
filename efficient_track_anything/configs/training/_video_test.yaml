# @package _global_

# Stage 2 (video finetuning) — Minimal test config for VRAM reduction
model:
  config_file: configs/efficienttam/efficienttam_ti_512x512.yaml
  overrides:
    - "++model.sam_mask_decoder_extra_args=null"

train:
  epochs: 1
  batch_size: 1
  accumulation_steps: 1
  num_workers: 0  # 0 reduces memory overhead
  
  backbone_lr: 6.0e-5
  head_lr: 3.0e-4
  layerwise_decay: 0.8
  weight_decay: 0.1
  warmup_pct: 0.05
  grad_clip: 0.1

  focal_w: 20.0
  dice_w: 1.0
  iou_w: 1.0
  obj_w: 1.0

  image_size: 512
  clip_len: 2  # Minimal clip length to save VRAM
  stride_choices: [1]
  correction_prob: 0.5
  max_correction_frames: 1

  prompt_mode: mixed
  max_neg_points: 0
  box_jitter_pct: 0.05
  scale_range: [0.7, 1.0]
  image_mix_prob: 0.5
  image_scale_range: [0.5, 1.0]
  hflip_prob: 0.5
  brightness: 0.1
  contrast: 0.03
  saturation: 0.03
  grayscale_prob: 0.05
  affine_degree: 25.0
  affine_shear: 20.0

  objects_per_clip: 1

  log_every: 1
  seed: 0
