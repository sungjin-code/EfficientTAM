# @package _global_

# Stage 2 (video finetuning) — efficienttam_ti.
model:
  config_file: configs/efficienttam/efficienttam_ti.yaml
  overrides:
    - "++model.sam_mask_decoder_extra_args=null"
    # Used when Stage 2 is launched without --init-from; --init-from still overrides it.
    - "++model.image_encoder.weights_path=efficient_sam_vitt"

train:
  epochs: 1000000
  max_steps: 300000
  batch_size: 4                 # per GPU; paper global batch is 256
  accumulation_steps: 1
  num_workers: 2

  backbone_lr: 6.0e-5
  head_lr: 3.0e-4
  layerwise_decay: 0.8
  weight_decay: 0.1
  scheduler: cosine
  warmup_steps: 15000
  grad_clip: 0.1

  focal_w: 20.0
  dice_w: 1.0
  iou_w: 1.0
  obj_w: 1.0

  # Recompute image-encoder activations in the backward pass to cut peak memory
  # (large saving since each clip frame is duplicated per object). ~20-30% slower.
  # Set to false if you have spare VRAM and want max throughput.
  use_act_checkpoint: true

  image_size: 1024
  clip_len: 8
  stride_choices: [1, 2, 3]
  correction_prob: 0.5
  max_correction_frames: 2
  # SAM2-style iterative correction: each selected frame is first tracked, then
  # corrected with extra click(s) using the previous low-res mask logits.
  num_correction_points_per_frame: 1
  add_correction_frames_as_cond: false

  prompt_mode: mixed
  max_neg_points: 0
  box_jitter_pct: 0.05
  scale_range: [0.7, 1.0]
  image_mix_prob: 0.1
  image_scale_range: [0.5, 1.0]
  hflip_prob: 0.5
  brightness: 0.1
  contrast: 0.03
  saturation: 0.03
  grayscale_prob: 0.05
  affine_degree: 25.0
  affine_shear: 20.0

  objects_per_clip: 3

  log_every: 5
  seed: 0
