# @package _global_

# Stage 1 (image pretraining) — efficienttam_s.
# Paper §5.1 pretraining: SA-1B, 90k optimizer steps, global batch 256,
# AdamW β=(0.9,0.999), initial LR 4e-4, inverse-sqrt decay, 1k warmup,
# 5k cooldown, wd=0.1, layer-wise decay 0.8, bf16, focal:dice=20:1,
# image_size=1024, max 64 masks/image.
model:
  config_file: configs/efficienttam/efficienttam_s.yaml
  overrides:
    # `apply_postprocessing=False` already null's this; explicit here for safety.
    - "++model.sam_mask_decoder_extra_args=null"
    # Paper initialization: SAMI-pretrained EfficientSAM ViT-S image encoder.
    - "++model.image_encoder.weights_path=efficient_sam_vits"

train:
  # Optimization (paper-aligned)
  epochs: 1000000             # max_steps is the real budget
  max_steps: 90000
  batch_size: 8               # per GPU; paper global batch is 256
  accumulation_steps: 1
  num_workers: 4
  backbone_lr: 4.0e-4
  head_lr: 4.0e-4
  layerwise_decay: 0.8
  weight_decay: 0.1
  scheduler: inverse_sqrt
  warmup_steps: 1000
  cooldown_steps: 5000
  grad_clip: 0.1

  # Stage-1 pretraining supervises mask prediction only: focal:dice=20:1.
  focal_w: 20.0
  dice_w: 1.0
  iou_w: 0.0
  obj_w: 0.0

  # Data / prompts
  image_size: 1024
  prompt_mode: mixed          # 60% point, 40% box
  max_neg_points: 0
  box_jitter_pct: 0.05
  scale_range: [0.5, 1.0]
  hflip_prob: 0.5
  # Paper augmentation magnitudes
  brightness: 0.1
  contrast: 0.03
  saturation: 0.03
  grayscale_prob: 0.05
  affine_degree: 25.0
  affine_shear: 20.0

  objects_per_image: 64

  log_every: 20
  seed: 0
