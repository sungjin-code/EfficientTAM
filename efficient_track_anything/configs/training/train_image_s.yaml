# Stage 1 (image pretraining) — efficienttam_s.
# Paper §experimental setup: AdamW (β=0.9,0.999), backbone_lr=6e-5, head_lr=3e-4,
# batch=256, 300k steps, image_size=1024, loss ratio 20:1:1:1, 64 masks/image.
# On single-GPU the paper batch is unreachable — set `objects_per_image` and
# `batch_size` to whatever your memory allows, and use `--max-steps` from the CLI.
model:
  config_file: configs/efficienttam/efficienttam_s.yaml
  overrides:
    # `apply_postprocessing=False` already null's this; explicit here for safety.
    - "++model.sam_mask_decoder_extra_args=null"

train:
  # Optimization (paper-aligned)
  epochs: 90                  # used only if --max-steps is not given
  batch_size: 8               # paper uses 256 across many GPUs
  num_workers: 4
  backbone_lr: 6.0e-5         # paper value
  head_lr: 3.0e-4             # paper value
  layerwise_decay: 0.8
  weight_decay: 0.1
  warmup_pct: 0.05
  grad_clip: 0.1

  # Loss weights — paper §experimental setup (20:1:1:1)
  focal_w: 20.0
  dice_w: 1.0
  iou_w: 1.0
  obj_w: 1.0

  # Data / prompts
  image_size: 1024
  prompt_mode: mixed          # 60% point, 40% box
  max_neg_points: 0
  box_jitter_pct: 0.05
  scale_range: [0.5, 1.0]
  hflip_prob: 0.5
  # Paper augmentation magnitudes
  brightness: 0.1
  contrast: 0.03
  saturation: 0.03
  grayscale_prob: 0.05
  affine_degree: 25.0
  affine_shear: 20.0

  # Multi-object batching: paper trains 64 masks/image; raise as memory permits.
  objects_per_image: 8

  log_every: 20
  seed: 0
